<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes 监控中心 v22</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050810; color: #d8e0f0; font-family: 'Segoe UI', system-ui, sans-serif; }

  #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

  /* 顶栏 */
  #topbar {
    height: 40px;
    background: linear-gradient(90deg, #0a1020 0%, #1a1830 50%, #0a1020 100%);
    border-bottom: 1px solid #2a3a5a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
  }
  #topbar .logo { font-weight: bold; color: #00f5d4; font-size: 14px; letter-spacing: 1px; }
  #topbar .ver { font-size: 11px; color: #6a7a9a; }
  #topbar .spacer { flex: 1; }
  #topbar .clock { font-family: 'Courier New', monospace; font-size: 14px; color: #d8e0f0; }
  #topbar .conn { font-size: 12px; color: #00ff80; }

  /* 主内容区：左 80% office + 右 20% Daily Metrics Dashboard */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* 左侧办公室 */
  #office {
    width: 80%;
    height: 100%;
    background: #050810;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #office canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    box-shadow: 0 0 30px rgba(0,200,200,0.15);
  }

  /* 右侧服务器栏 */
  #servers {
    width: 20%;
    height: 100%;
    background: #080c18;
    border-left: 1px solid #2a3a5a;
    display: flex;
    flex-direction: column;
    padding: 8px;
    gap: 6px;
    overflow-y: auto;
    overflow-x: hidden;
    /* 小屏下限：确保卡片不被压扁 */
    min-width: 180px;
    flex-shrink: 0;
  }
  #servers .panel {
    flex: 1;
    min-height: 130px;
    background: #0d0e1f;
    border: 1px solid #2a3a5a;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  #servers .panel canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── 响应式断点 ── */
  /* 1100px 以下：左侧收窄，给右侧更多空间 */
  @media (max-width: 1100px) {
    #office   { width: 72%; }
    #servers  { width: 28%; }
  }
  /* 900px 以下：右侧进一步扩大，左侧继续收窄 */
  @media (max-width: 900px) {
    #office   { width: 65%; }
    #servers  { width: 35%; }
  }
  /* 768px 以下（小屏笔记本/平板竖屏）：三栏全部显示困难，改为紧凑条带 */
  @media (max-width: 768px) {
    #main { flex-direction: column; overflow-y: auto; }
    #office   { width: 100%; height: 55vh; flex-shrink: 0; }
    #servers  {
      width: 100%;
      height: auto;
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 6px;
      padding: 6px;
      border-left: none;
      border-top: 1px solid #2a3a5a;
      min-width: unset;
    }
    #servers .panel {
      flex: 0 0 auto;
      width: 160px;
      min-height: 130px;
      height: 100%;
    }
  }

  /* 底栏 */
  #bottombar {
    height: 24px;
    background: #0a1020;
    border-top: 1px solid #2a3a5a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 11px;
    color: #6a7a9a;
    gap: 16px;
    flex-shrink: 0;
  }
  #bottombar .ver { color: #00f5d4; }

  /* loading */
  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #6a7a9a;
    font-size: 13px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="logo">⬢ HERMES MONITOR</span>
    <span class="ver">v22 · M4</span>
    <span class="spacer"></span>
    <span class="clock" id="clock">--:--:--</span>
    <span class="conn" id="conn">● 连接中…</span>
  </div>
  <div id="main">
    <div id="office">
      <canvas id="cv-office"></canvas>
      <div id="loading">加载场景…</div>
    </div>
    <div id="servers" id="server-list">
      <!-- 动态生成 -->
    </div>
  </div>
  <div id="bottombar">
    <span>Hermes Monitor</span>
    <span class="ver">v22 · M4 Token Sparkline</span>
    <span class="spacer" style="flex:1;"></span>
    <span id="profile-count">0 分身</span>
  </div>
</div>

<script src="/static/server-panel.js"></script>
<script src="/static/pixel-office.js"></script>
<script>
  // 启动
  window.addEventListener('DOMContentLoaded', () => {
    PixelOffice.init();
    ServerPanel.init();
    connectWS();
    setInterval(updateClock, 1000);
    updateClock();
  });
  window.addEventListener('resize', () => {
    PixelOffice.resize();
    ServerPanel.resize();
  });

  function updateClock() {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).formatToParts(new Date());
    const get = t => (parts.find(p => p.type === t) || {}).value || '00';
    document.getElementById('clock').textContent = `${get('hour')}:${get('minute')}:${get('second')} CST`;
  }

  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      document.getElementById('conn').textContent = '● 已连接';
      document.getElementById('conn').style.color = '#00ff80';
    };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state') {
          const data = msg.data;
          PixelOffice.update(data);
          ServerPanel.update(data);
          document.getElementById('profile-count').textContent = (data.profiles || []).length + ' 分身';
        }
      } catch(err) { console.error('[WS]', err); }
    };
    ws.onerror = () => {
      document.getElementById('conn').textContent = '● 连接错误';
      document.getElementById('conn').style.color = '#ff4040';
    };
    ws.onclose = () => {
      document.getElementById('conn').textContent = '● 已断开';
      document.getElementById('conn').style.color = '#ff8040';
      setTimeout(connectWS, 3000);
    };
  }
</script>
</body>
</html>
